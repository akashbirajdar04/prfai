name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm  

      - name: install dependencies
        run: |
          npm ci
          cd frontend && npm install
          cd ../backend && npm install

      - name: run lint
        run: npm run lint